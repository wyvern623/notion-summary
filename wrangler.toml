name = "notion-summarizer"
main = "src/index.ts"
compatibility_date = "2026-06-29"
compatibility_flags = ["nodejs_compat"]
# *.workers.dev の URL は有効化 (Notion Webhook の宛先に使用)。
workers_dev = true
# プレビュー URL は不要なので無効化 (デプロイ時の WARNING も消える)。
preview_urls = false

# --- 非機密の設定値 (spec §14 Workers vars) ---
# 機密値 (NOTION_API_TOKEN / NOTION_WEBHOOK_TOKEN / GEMINI_API_KEY /
# SLACK_BOT_TOKEN / SLACK_SUMMARY_CHANNEL_ID) は `wrangler secret put` で設定する。
# ここには絶対に書かない。
[vars]
NOTION_VERSION = "2022-06-28"
NOTION_EVENT_TYPES = "page.content_updated,page.created"
# デバウンス: 最後の編集から 600 秒 (10分) 通知が無ければ要約
# ※動作確認のため一時的に 10 秒に設定中。確認後 "600" に戻すこと。
SUMMARY_DELAY_SECONDS = "10"
# クールダウン: 前回要約から 1800 秒 (30分) は次の要約を出さない
# ※動作確認のため一時的に 30 秒に設定中。確認後 "1800" に戻すこと。
SUMMARY_MIN_INTERVAL_SECONDS = "30"
GEMINI_MODEL = "gemini-2.5-flash-lite"
SUMMARY_LENGTH = "medium"
SUMMARY_STYLE = "bullet"
# 無料 (Workers Free) 前提で subrequest 上限 (1実行50) に収めるため控えめに設定
NOTION_PAGE_SIZE = "100"
NOTION_MAX_BLOCK_FETCHES = "30"
NOTION_MAX_BLOCKS = "800"
NOTION_MAX_MARKDOWN_CHARS = "30000"
LOG_LEVEL = "INFO"
DEBUG_VERBOSE = "false"
# 失敗ジョブの最大リトライ回数 (D1 retry_count ベース)
SUMMARY_MAX_RETRIES = "3"
# 1 回の Cron 実行で処理するページ数 (subrequest 枠を超えないよう小さめ)
CRON_MAX_PAGES = "3"

# --- Cron Trigger: Queue の代替。毎分 due なページを処理する ---
[triggers]
crons = ["* * * * *"]

# --- D1: デバウンス状態・実行履歴・要約結果 ---
# database_id は `wrangler d1 create notion-summarizer-db` で発行した実 ID に差し替える。
[[d1_databases]]
binding = "DB"
database_name = "notion-summarizer-db"
database_id = "fcdece39-c7ab-40b5-8a56-81751f6805e0"
migrations_dir = "migrations"
